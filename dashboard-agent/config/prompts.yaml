# Graph Report Generator - Prompts Configuration

analysis_prompt:
  system: |
    You are an analytical report writer. Analyze each provided graph image individually and produce structured markdown tables.
    Your response MUST start directly with the first markdown heading — no preamble, no tool activity log, no introductory text.
    Do not mention CloudHealth unless a provided graph name or image visibly contains that term.

  user_template: |
    Analyze the provided graph images.
    If any graph is not fully visible or readable, provide your best effort to extract and analyze the visible data, and note any limitations in the Observations column.
    If a graph contains no readable data, state that no readable data is available for that graph.
    The analysis is a snapshot in time based on the provided images, which may not reflect real-time changes after the images were captured.

    Report Information:
    {report_info}

    Graphs: {graph_count} image(s)

    Graphs to analyze. Use these EXACT graph names in the Graph column and do not invent names:
    {graph_list}

    {focus_instruction}

    Read every image path listed above. Each file contains one graph or chart.
    For each graph, produce analysis using the exact graph name supplied above.

    ---

    ## Output Structure

    For every graph, add one or more rows to this table.
    IMPORTANT: use the EXACT graph name from the list above in the "Graph" column.
    Multiple findings from the same graph MUST share the EXACT same graph name so they are grouped together.

    ### Graph Analysis

    | Graph | Scope / Time Range | Key Values | Trend | Observations |
    |---|---|---|---|---|
    | [exact graph name] | [series/category scope and dates if visible] | [specific values, ranges, percentages, or N/A] | [increase/decrease/stable/N/A] | [anomalies, patterns, limitations, severity indicator] |

    After all graph tables, produce:

    ### Executive Summary

    | Category | Finding | Severity |
    |---|---|---|
    | Overall Pattern | [most important cross-graph pattern] | 🔴/⚠️/✅ |
    | Largest Movement | [largest visible increase/decrease or N/A] | 🔴/⚠️/✅ |
    | Critical Anomaly | [description if any, otherwise none visible] | 🔴/⚠️/✅ |
    | Data Quality | [visibility/readability limitations] | 🔴/⚠️/✅ |

    **Recommended Actions:**
    - Immediate: ...
    - Short-term: ...
    - Follow-up: ...

    ---

    ## Rules:
    - Start your response with the first `###` or `##` heading — NO introductory text before it
    - In the Graph column, use the EXACT graph name from the list above — no backticks, no filenames unless the graph name itself is a filename
    - Findings from the same graph MUST use the exact same graph name so they group correctly
    - Provide SPECIFIC values, percentages, labels, and date ranges extracted from the visible data
    - Do NOT describe chart types (bar, line, pie) — describe the DATA
    - Use severity indicators in Observations: 🔴 Critical | ⚠️ Warning | ✅ Positive
    - If a value is not visible or readable in the image, write "N/A"

focus_instructions:
  default: "Provide comprehensive analysis of all visible data across all graphs and panels."
  custom_template: "Focus area: {focus_area}\n\nPrioritize analysis related to this focus area, but include an overview of other visible data as well."

error_recovery:
  copilot_unavailable: |
    Unable to connect to Copilot CLI for automated analysis.
    
    Please use GitHub Copilot Chat in VS Code:
    1. Open Copilot Chat (Cmd/Ctrl + I)
    2. Attach the graph images
    3. Use the prompt template above
    4. Save response to: {output_file}
    5. Re-run the generator
  
  timeout_message: |
    Copilot CLI analysis timed out after {timeout} seconds.
    This may indicate the analysis is complex or screenshots are large.
    Falling back to manual analysis instructions.
  
  graph_input_failure: |
    Failed to load graph image inputs.

    Please verify each --graph value uses the format "Name=/path/to/image-or-url" and that every local path exists.
